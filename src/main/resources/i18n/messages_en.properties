welcome=\ud83c\udf82 <b>Welcome to Festiva\!</b>\n\nNever forget a friend's birthday again. Festiva reminds you <b>today</b>, <b>tomorrow</b>, and <b>7 days</b> before every birthday.\n\n\u2728 Add friends, browse by month, get milestone alerts, import & export via CSV.\n\nTap \u2139\ufe0f <b>About</b> to learn more, or just start with \u2795 <b>Add</b>.
menu=\ud83d\udcd6 <b>Festiva commands:</b>\n\n\ud83d\udc65 <b>Friends:</b>\n/list \u2014 list friends\n/add \u2014 add a friend\n/addmany \u2014 bulk add friends\n/export \u2014 export friends\n/remove \u2014 remove a friend\n/edit \u2014 edit a friend\n/search \u2014 search friends\n\n\ud83c\udf82 <b>Birthdays:</b>\n/today \u2014 today's birthdays\n/birthdays \u2014 by month\n/upcomingbirthdays \u2014 upcoming\n/jubilee \u2014 milestones\n\n\ud83d\udcca /stats \u2014 your stats\n\u2699\ufe0f /settings \u2014 notifications & timezone\n\ud83c\udf10 /language \u2014 change language\n/deleteaccount \u2014 delete your data\n/cancel \u2014 cancel current operation
about=\u2139\ufe0f <b>About Festiva</b>\n\nFestiva is an open-source Telegram bot that helps you never forget a friend's birthday.\n\n\ud83d\udd14 <b>Reminders</b> \u2014 daily at 09:00 for birthdays today, tomorrow, and in 7 days\n\ud83c\udf89 <b>Milestone highlights</b> \u2014 jubilee birthdays (multiples of 5) called out specially\n\ud83d\udcc5 <b>Month browsing</b> \u2014 scroll through birthdays month by month\n\ud83c\udf10 <b>Bilingual</b> \u2014 full English and Russian support\n\ud83d\udc65 <b>Friend management</b> \u2014 add, edit, remove with relationship labels\n\ud83d\udce6 <b>Bulk import</b> \u2014 add many friends at once via CSV\n\ud83d\udce4 <b>Export</b> \u2014 download your list as CSV\n\ud83d\udd0d <b>Search</b> \u2014 find friends by name\n\ud83d\udcca <b>Stats</b> \u2014 birthday statistics\n\u2699\ufe0f <b>Settings</b> \u2014 notification hour and timezone\n\n\ud83d\udc68\u200d\ud83d\udcbb <a href="https://github.com/Sunagatov/Festiva">Open source on GitHub</a>\n\ud83d\udcd6 <a href="https://github.com/Sunagatov/Festiva#-feature-documentation">Feature documentation</a>
