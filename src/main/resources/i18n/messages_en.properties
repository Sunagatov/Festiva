ics_prompt=\ud83d\udcc5 <b>How to export from Google Calendar:</b>\n1. Open calendar.google.com\n2. Click \u2699\ufe0f Settings\n3. In the left sidebar, find <b>your calendar</b> (e.g. your name or email)\n4. Scroll down to <b>Export calendar</b> and click it\n5. Unzip the downloaded .zip file\n6. Send the <b>.ics file named after your email</b> (not Birthdays_*.ics)\n\nOr tap /cancel to stop.
