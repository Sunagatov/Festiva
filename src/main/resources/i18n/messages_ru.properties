bulk_add_prompt=📋 <b>Массовое добавление друзей</b>\n\nОтправьте текстовое сообщение или <b>.csv файл</b>, по одному другу на строку:\n<code>Имя,ДД.ММ.ГГГГ</code>\n\nПример:\n<code>Алиса,15.03.1990\nБоб,22.07.1985</code>\n\nМаксимум 50 записей. Нажмите /cancel для отмены.
