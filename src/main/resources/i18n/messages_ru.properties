welcome=👋 <b>Добро пожаловать в Festiva!</b>\nЯ помогу вам не забыть дни рождения друзей.\n\n👥 <b>Друзья:</b>\n/list — список друзей\n/add — добавить друга\n/addmany — добавить несколько\n/remove — удалить друга\n/edit — редактировать друга\n/search — поиск друзей\n\n🎂 <b>Дни рождения:</b>\n/birthdays — по месяцам\n/upcomingbirthdays — ближайшие\n/jubilee — юбилейные\n\n📊 /stats — ваша статистика\n⚙️ /settings — уведомления и часовой пояс\n🌐 /language — сменить язык\n/cancel — отменить текущую операцию
