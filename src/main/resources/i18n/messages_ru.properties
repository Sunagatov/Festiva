welcome=\ud83c\udf82 <b>Добро пожаловать в Festiva!</b>\n\nБольше никаких забытых дней рождения. Festiva напомнит вам <b>сегодня</b>, <b>завтра</b> и <b>за 7 дней</b> до каждого дня рождения.\n\n\u2728 Добавляйте друзей, просматривайте по месяцам, получайте уведомления о юбилеях, импортируйте и экспортируйте через CSV.\n\nНажмите \u2139\ufe0f <b>О боте</b>, чтобы узнать больше, или сразу \u2795 <b>Добавить</b>.
menu=📖 <b>Команды Festiva:</b>\n\n👥 <b>Друзья:</b>\n/list — список друзей\n/add — добавить друга\n/addmany — добавить несколько\n/export — экспорт друзей\n/remove — удалить друга\n/edit — редактировать друга\n/search — поиск друзей\n\n🎂 <b>Дни рождения:</b>\n/today — сегодняшние дни рождения\n/birthdays — по месяцам\n/upcomingbirthdays — ближайшие\n/jubilee — юбилейные\n\n📊 /stats — ваша статистика\n⚙️ /settings — уведомления и часовой пояс\n🌐 /language — сменить язык\n/deleteaccount — удалить данные\n/cancel — отменить текущую операцию
about=\u2139\ufe0f <b>О Festiva</b>\n\nFestiva \u2014 это бот с открытым исходным кодом, который помогает не забывать дни рождения друзей.\n\n\ud83d\udd14 <b>Напоминания</b> \u2014 ежедневно в 09:00 о днях рождения сегодня, завтра и через 7 дней\n\ud83c\udf89 <b>Юбилеи</b> \u2014 особое выделение юбилейных дней рождения (кратных 5)\n\ud83d\udcc5 <b>Просмотр по месяцам</b> \u2014 листайте дни рождения по месяцам\n\ud83c\udf10 <b>Двуязычность</b> \u2014 полная поддержка русского и английского\n\ud83d\udc65 <b>Управление друзьями</b> \u2014 добавление, редактирование, удаление с метками отношений\n\ud83d\udce6 <b>Массовый импорт</b> \u2014 добавление через CSV\n\ud83d\udce4 <b>Экспорт</b> \u2014 скачать список в CSV\n\ud83d\udd0d <b>Поиск</b> \u2014 поиск друзей по имени\n\ud83d\udcca <b>Статистика</b> \u2014 статистика дней рождения\n\u2699\ufe0f <b>Настройки</b> \u2014 час уведомлений и часовой пояс\n\n\ud83d\udc68\u200d\ud83d\udcbb <a href="https://github.com/Sunagatov/Festiva">Открытый исходный код на GitHub</a>\n\ud83d\udcd6 <a href="https://github.com/Sunagatov/Festiva#-feature-documentation">Документация по функциям</a>
