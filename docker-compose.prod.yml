networks:
  festiva-network:
    name: festiva-network

services:

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: festiva-bot
    env_file: .env.prod
    environment:
      - SPRING_APPLICATION_JSON={"spring":{"mongodb":{"uri":"mongodb+srv://admin_festiva_db_user:8xfz9D9gwC0QkKMN@festivacluster.tdjxva4.mongodb.net/?retryWrites=true&w=majority&appName=FestivaCluster"}}}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - '8080:8080'
    networks:
      - festiva-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
